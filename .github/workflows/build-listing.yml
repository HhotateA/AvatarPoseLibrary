name: Build Repo Listing

env:
  LIST_PUBLISH_DIRECTORY: Website
  PATH_TO_CI: ci
  
on: 
  workflow_dispatch:
  workflow_run:
    workflows: [Build Release, PR Merge Workflow]
    types:
      - completed
  release:
     types: [published, created, edited, unpublished, deleted, released]

# GitHub Pagesへのデプロイに必要なGITHUB_TOKENの権限。
permissions:
  contents: read
  pages: write
  id-token: write
  
# 同時に実行するデプロイを1件に制限する。
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  
  # VPMリストサイトを生成し、GitHub Pagesへデプロイする。
  build-listing:
    name: build-listing
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      
      # このリポジトリをチェックアウトする。
      - name: Checkout Local Repository
        uses: actions/checkout@v4

      # 既存のチェックアウトを維持したまま、自動化用リポジトリを取得する。
      - name: Checkout Automation Repository
        uses: actions/checkout@v4
        with:
          repository: vrchat-community/package-list-action
          path: ${{ env.PATH_TO_CI }}
          clean: false

      # 前回の実行で保存したキャッシュを復元する。
      - name: Restore Cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PATH_TO_CI }}/.nuke/temp
            ~/.nuget/packages
          key: ${{ runner.os }}-${{ hashFiles('**/global.json', '**/*.csproj') }}
      
      # Nukeを使用してパッケージのバージョン一覧を生成する。
      - name: Build Package Version Listing
        run: ${{ env.PATH_TO_CI }}/build.cmd BuildRepoListing --root ${{ env.PATH_TO_CI }} --list-publish-directory "$GITHUB_WORKSPACE/${{ env.LIST_PUBLISH_DIRECTORY }}" --current-package-name "${{ vars.PACKAGE_NAME }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # GitHub Pagesへのデプロイを準備する。
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      # VPMリストサイトをGitHub Pages用アーティファクトとしてアップロードする。
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.LIST_PUBLISH_DIRECTORY }}
      
      # アップロードしたVPMリストサイトをGitHub Pagesへデプロイする。
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
