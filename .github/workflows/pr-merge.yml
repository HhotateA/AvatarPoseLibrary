name: PR Merge Workflow

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write

# バージョン更新からリリースまでを直列化し、連続マージをすべて待機させる。
concurrency:
  group: package-release-${{ github.repository }}
  queue: max

jobs:
  increment-version:
    if: github.event.pull_request.merged == true
    uses: ./.github/workflows/increment-version.yml
    secrets:
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}

  release:
    needs: increment-version
    if: github.event.pull_request.merged == true
    uses: ./.github/workflows/release.yml
    with:
      checkout_ref: ${{ needs.increment-version.outputs.commit_sha }}
    secrets:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
