name: Build Release

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      checkout_ref:
        description: リリース対象のGit ref
        required: false
        type: string
    secrets:
      DISCORD_WEBHOOK_URL:
        required: false

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      config_package: ${{ steps.config_package.outputs.configPackage }}
    steps:
      # リポジトリ変数が未設定の場合に、安全にリリースをスキップするための事前検証。
      - name: Validate package config
        id: config_package
        env:
          PACKAGE_NAME: ${{ vars.PACKAGE_NAME }}
        run: |
          if [[ -n "$PACKAGE_NAME" ]]; then
            echo "configPackage=true" >> "$GITHUB_OUTPUT"
          else
            echo "configPackage=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: config
    if: needs.config.outputs.config_package == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PACKAGE_PATH: Packages/${{ vars.PACKAGE_NAME }}
    steps:
      # バージョン更新後の固定SHAを使用し、後続のmain更新による取り違えを防ぐ。
      - name: Checkout release ref
        uses: actions/checkout@3df4ab11eba7bda6032a0b82a6bb43b11571feac
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}

      - name: Get version
        id: version
        uses: zoexx/github-action-json-file-properties@b9f36ce6ee6fe2680cd3c32b2c62e22eade7e590
        with:
          file_path: "${{ env.PACKAGE_PATH }}/package.json"
          prop_path: version

      - name: Set release environment
        run: |
          echo "ZIP_FILE=${{ vars.PACKAGE_NAME }}-${{ steps.version.outputs.value }}.zip" >> "$GITHUB_ENV"
          echo "UNITY_PACKAGE=${{ vars.PACKAGE_NAME }}-${{ steps.version.outputs.value }}.unitypackage" >> "$GITHUB_ENV"
          echo "VERSION=${{ steps.version.outputs.value }}" >> "$GITHUB_ENV"

      - name: Create package zip
        working-directory: "${{ env.PACKAGE_PATH }}"
        run: zip -r "${{ github.workspace }}/${{ env.ZIP_FILE }}" .

      - name: Track package meta files
        run: find "${{ env.PACKAGE_PATH }}/" -name '*.meta' > metaList

      - name: Create Unity package
        uses: pCYSl5EDgo/create-unitypackage@v1.2.3
        with:
          package-path: ${{ env.UNITY_PACKAGE }}
          include-files: metaList

      - name: Create tag
        uses: rickstaa/action-create-tag@88dbf7ff6fe2405f8e8f6c6fdfd78829bc631f83
        with:
          tag: "${{ env.VERSION }}"
          commit_sha: ${{ inputs.checkout_ref || github.sha }}
          tag_exists_error: false

      - name: Publish release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844
        with:
          files: |
            ${{ env.ZIP_FILE }}
            ${{ env.UNITY_PACKAGE }}
            ${{ env.PACKAGE_PATH }}/package.json
          tag_name: ${{ env.VERSION }}

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [[ -z "$DISCORD_WEBHOOK_URL" ]]; then
            echo "Discord webhook is not configured; skipping notification."
            exit 0
          fi
          jq -n --arg content "AvatarPoseLibrary v${VERSION} has been released." \
            '{content: $content}' \
            | curl --fail-with-body --header "Content-Type: application/json" \
                --data @- "$DISCORD_WEBHOOK_URL"
