name: Increment Version

on:
  workflow_dispatch:  # 手動トリガー
  workflow_call:  # 他のワークフローから呼び出し可能

permissions:
  contents: write  # リポジトリへの書き込み権限を付与

jobs:
  increment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Increment version in package.json
        working-directory: Packages/com.hhotatea.avatar-pose-library
        run: |
          npm version patch --no-git-tag-version

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Packages/com.hhotatea.avatar-pose-library/package.json
          git commit -m "Increment version to $(node -p 'require("./Packages/com.hhotatea.avatar-pose-library/package.json").version')"
          git push