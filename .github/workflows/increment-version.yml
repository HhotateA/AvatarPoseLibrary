name: Increment Version

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      DEPLOY_KEY:
        required: true

permissions:
  contents: write

jobs:
  increment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Setup SSH key for push
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key -T git@github.com || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Increment version in package.json
        working-directory: Packages/com.hhotatea.avatar-pose-library
        run: |
          npm version patch --no-git-tag-version

      - name: Commit and push changes
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Packages/com.hhotatea.avatar-pose-library/package.json
          git commit -m "Increment version to $(node -p 'require("./Packages/com.hhotatea.avatar-pose-library/package.json").version')" || exit 0
          git remote set-url origin git@github.com:HhotateA/AvatarPoseLibrary.git
          git push origin HEAD:main