name: Increment Version

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      DEPLOY_KEY:
        required: true

permissions:
  contents: write

jobs:
  increment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Debug SSH setup
        run: |
          git remote -v
          test -n "${{ secrets.DEPLOY_KEY }}" && echo "DEPLOY_KEY is set" || echo "DEPLOY_KEY is empty"
          ls -la ~/.ssh || true
          ssh -T git@github.com || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Increment version in package.json
        working-directory: Packages/com.hhotatea.avatar-pose-library
        run: |
          npm version patch --no-git-tag-version

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Packages/com.hhotatea.avatar-pose-library/package.json
          git commit -m "Increment version to $(node -p 'require("./Packages/com.hhotatea.avatar-pose-library/package.json").version')" || exit 0
          git push origin HEAD:main